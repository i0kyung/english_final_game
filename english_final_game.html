<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Arrange Lab: Final Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap');

:root{
  --bg-top:#FFF6E8;
  --bg-bottom:#E7F5FF;
  --ink:#3B3553;
  --ink-soft:#746E94;
  --ink-faint:#A6A0C2;
  --card-bg:#FFFFFF;
  --card-border:#EFE9FB;
  --primary:#5FC2C9;
  --primary-dark:#3FA0A8;
  --primary-bg:#E3F7F8;
  --secondary:#7FB0E8;
  --secondary-dark:#5C8FCB;
  --accent:#FFD166;
  --correct:#4CAF6F;
  --correct-bg:#E6F8EA;
  --correct-border:#9FE3B4;
  --wrong:#F25C6E;
  --wrong-bg:#FFEAEE;
  --wrong-border:#FAB7C0;
  --partial:#F2A640;
  --partial-bg:#FFF3DF;
  --partial-border:#F8D89B;
  --slot-bg:#F7F4FF;
  --slot-border:#D9CFF2;
  --shadow-sm:0 2px 8px rgba(90,76,150,0.08);
  --shadow-md:0 8px 20px rgba(90,76,150,0.14);
  --shadow-lg:0 16px 36px rgba(90,76,150,0.18);
  --radius-lg:26px;
  --radius-md:16px;
  --radius-sm:11px;
  --radius-pill:999px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  background:linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3{font-family:'Baloo 2',sans-serif; margin:0;}
button{font-family:'Nunito',sans-serif; cursor:pointer; border:none; background:none;}
.hidden{display:none !important;}

#app{position:relative; min-height:100vh; display:flex; flex-direction:column;}

/* ===== Floating decoration ===== */
.bg-float{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;}
.bg-float span{
  position:absolute; font-size:2.4rem; opacity:0.18;
  animation:floatUp 9s ease-in-out infinite;
}
@keyframes floatUp{
  0%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-22px) rotate(8deg);}
  100%{transform:translateY(0) rotate(0deg);}
}

/* ===== Generic layout ===== */
.screen{position:relative; z-index:1; width:100%; max-width:760px; margin:0 auto; padding:20px 18px 40px; flex:1; display:flex; flex-direction:column;}
.panel{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);
  padding:26px 24px;
}

/* ===== Buttons ===== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:12px 20px; border-radius:var(--radius-pill);
  font-weight:700; font-size:0.98rem;
  transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  box-shadow:var(--shadow-sm);
  white-space:nowrap;
}
.btn:active{transform:translateY(1px) scale(0.98);}
.btn:disabled{opacity:0.45; cursor:not-allowed; box-shadow:none;}
.btn-primary{background:linear-gradient(135deg, var(--primary), var(--secondary)); color:#fff;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px); box-shadow:var(--shadow-md);}
.btn-ghost{background:var(--card-bg); color:var(--ink); border:1.5px solid var(--card-border);}
.btn-ghost:hover{border-color:var(--primary); color:var(--primary-dark);}
.btn-soft{background:var(--primary-bg); color:var(--primary-dark);}
.btn-soft:hover:not(:disabled){background:#d3f0f1;}
.btn-warn{background:var(--accent); color:#5a4500;}
.btn.big{padding:16px 28px; font-size:1.08rem; width:100%;}
.icon-btn{
  width:40px; height:40px; border-radius:50%; background:var(--card-bg);
  display:flex; align-items:center; justify-content:center; font-size:1.2rem;
  box-shadow:var(--shadow-sm); color:var(--ink-soft); flex-shrink:0;
}
.icon-btn:hover{color:var(--primary-dark);}

/* ===== MAIN SCREEN ===== */
.main-screen{align-items:center; justify-content:center; text-align:center; min-height:100vh;}
.main-card{max-width:480px; width:100%; padding:40px 30px 32px;}
.lab-icon{font-size:3.4rem; margin-bottom:6px;}
.main-card h1{font-size:1.9rem; color:var(--primary-dark); line-height:1.25;}
.main-card .subtitle{font-family:'Baloo 2',sans-serif; font-weight:600; color:var(--secondary-dark); font-size:1.05rem; margin-top:2px;}
.main-card .tagline{color:var(--ink-soft); margin:14px 0 26px; font-size:0.96rem;}
.main-actions{display:flex; flex-direction:column; gap:12px;}
.badge-shelf{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:24px;}
.badge-chip{
  background:var(--primary-bg); color:var(--primary-dark); font-size:0.78rem; font-weight:700;
  padding:6px 12px; border-radius:var(--radius-pill); display:flex; align-items:center; gap:4px;
}
.badge-shelf-empty{color:var(--ink-faint); font-size:0.85rem; margin-top:20px;}

/* ===== TOPBAR (shared) ===== */
.topbar{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
.topbar-title{flex:1; min-width:0;}
.topbar-title h2{font-size:1.2rem; color:var(--ink);}
.topbar-sub{color:var(--ink-soft); font-size:0.84rem; margin-top:2px;}

/* ===== UNIT SELECT ===== */
.unit-block{margin-bottom:22px;}
.unit-heading{
  font-family:'Baloo 2',sans-serif; font-weight:700; color:var(--secondary-dark);
  font-size:1.05rem; margin:0 4px 10px; display:flex; align-items:center; gap:8px;
}
.unit-heading::before{content:"📘";}
.chapter-card{
  background:var(--card-bg); border:1.5px solid var(--card-border); border-radius:var(--radius-md);
  padding:16px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px;
  box-shadow:var(--shadow-sm); transition:transform .15s, box-shadow .15s;
}
.chapter-card:hover{transform:translateY(-2px); box-shadow:var(--shadow-md);}
.chapter-num{
  width:38px; height:38px; border-radius:50%; background:var(--primary-bg); color:var(--primary-dark);
  display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0; font-family:'Baloo 2',sans-serif;
}
.chapter-info{flex:1; min-width:0;}
.chapter-info .ctitle{font-weight:800; font-size:0.98rem; color:var(--ink);}
.chapter-info .cmeta{color:var(--ink-soft); font-size:0.78rem; margin-top:3px; display:flex; gap:10px; flex-wrap:wrap;}
.chapter-info .cmeta .done{color:var(--correct); font-weight:700;}
.chapter-go{flex-shrink:0;}

/* ===== QUIZ SCREEN ===== */
.quiz-screen{padding-top:16px;}
.quiz-stats{display:flex; gap:8px; flex-shrink:0;}
.stat-chip{
  background:var(--card-bg); border:1.5px solid var(--card-border); border-radius:var(--radius-pill);
  padding:6px 12px; font-weight:800; font-size:0.85rem; display:flex; align-items:center; gap:4px;
  box-shadow:var(--shadow-sm);
}
.stat-chip.combo-hot{background:linear-gradient(135deg,#FFD166,#FF9F6E); color:#5a3200; animation:pulseGlow 1.1s ease-in-out infinite;}
@keyframes pulseGlow{0%,100%{transform:scale(1);} 50%{transform:scale(1.08);}}

.prompt-card{
  background:var(--card-bg); border:1.5px solid var(--card-border); border-radius:var(--radius-md);
  padding:20px 20px; margin-bottom:18px; box-shadow:var(--shadow-sm);
}
.prompt-meta{color:var(--ink-faint); font-size:0.76rem; font-weight:700; letter-spacing:.02em; margin-bottom:8px; display:flex; gap:10px;}
.prompt-text{font-size:1.18rem; font-weight:800; color:var(--ink); line-height:1.5;}
.prompt-sub{color:var(--ink-soft); font-size:0.92rem; margin-top:6px; font-weight:600;}
.prompt-ko{font-size:0.82rem; color:#999; margin-top:4px; font-weight:600; line-height:1.45;}
.source-list{margin:10px 0 12px;display:grid;gap:6px;}
.source-line{font-size:0.96rem;font-weight:800;color:var(--secondary-dark);background:var(--primary-bg);border-radius:var(--radius-sm);padding:9px 11px;text-align:center;}
.guided-sentence{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;background:var(--slot-bg);border:1.5px dashed var(--slot-border);border-radius:var(--radius-md);padding:14px;margin:14px 0;}
.fixed-word{font-weight:900;color:var(--ink);background:#fff;border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:8px 10px;box-shadow:var(--shadow-sm);}
.blank-slot{min-width:72px;min-height:38px;border:2px dashed var(--slot-border);border-radius:var(--radius-sm);background:#fff;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-faint);font-weight:800;}
.sentence-rule-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0 16px;}
.sentence-rule-card{border:1.5px solid var(--card-border);border-radius:var(--radius-sm);padding:10px 11px;background:#fff;box-shadow:var(--shadow-sm);}
.sentence-rule-card.simple{border-color:#98E2D6;background:#ECFBF8;}
.sentence-rule-card.compound{border-color:#A9CCF5;background:#EEF6FF;}
.sentence-rule-card.complex{border-color:#D8C0FA;background:#F6F0FF;}
.sentence-rule-card .sr-name{font-weight:900;font-size:0.95rem;margin-bottom:4px;}
.sentence-rule-card .sr-ko{font-size:0.76rem;color:#999;font-weight:700;line-height:1.35;}
.sentence-rule-card .sr-ex{font-size:0.86rem;font-weight:800;color:var(--ink);margin-top:5px;line-height:1.35;}
.analysis-box{margin-top:10px;border:1.5px solid var(--card-border);border-radius:var(--radius-md);background:#fff;padding:12px;display:grid;gap:8px;}
.analysis-row{display:grid;grid-template-columns:132px 1fr;gap:8px;align-items:start;}
.analysis-label{font-size:0.72rem;color:var(--ink-faint);font-weight:900;text-transform:uppercase;}
.analysis-value{font-size:0.9rem;color:var(--ink);font-weight:800;line-height:1.35;}
.analysis-result{color:var(--primary-dark);}
.sentence-result-note{margin-top:12px;border:1.5px solid var(--primary);border-radius:var(--radius-md);padding:12px;background:var(--primary-bg);}
@media (max-width:560px){.sentence-rule-strip{grid-template-columns:1fr;}.analysis-row{grid-template-columns:1fr;gap:3px;}}

.section-label{font-size:0.78rem; font-weight:800; color:var(--ink-faint); margin:14px 2px 8px; letter-spacing:.03em; text-transform:uppercase;}

.slots-row, .pool-row{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:6px;}
.slot{
  min-width:64px; min-height:48px; padding:10px 14px; border-radius:var(--radius-sm);
  background:var(--slot-bg); border:2px dashed var(--slot-border);
  display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--ink-faint);
  font-size:0.98rem; transition:all .15s;
}
.slot.filled{
  background:var(--card-bg); border:2px solid var(--primary); color:var(--ink); cursor:pointer;
  box-shadow:var(--shadow-sm);
}
.slot.filled:hover{transform:translateY(-2px);}

.card-chip{
  padding:11px 16px; border-radius:var(--radius-sm); background:var(--card-bg);
  border:1.5px solid var(--card-border); box-shadow:var(--shadow-sm); font-weight:700;
  font-size:0.98rem; cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s;
}
.card-chip:hover{transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--primary);}
.card-chip:active{transform:translateY(0);}
.card-chip.selected{border-color:var(--secondary); background:var(--primary-bg); box-shadow:0 0 0 3px rgba(95,194,201,0.25);}
.card-chip.matched{background:var(--correct-bg); border-color:var(--correct-border); color:var(--correct); cursor:default; opacity:0.7;}

.match-cols{display:flex; gap:14px;}
.match-col{flex:1; display:flex; flex-direction:column; gap:9px;}

.classify-zones{display:flex; flex-wrap:wrap; gap:12px; margin-bottom:6px;}
.zone{
  flex:1; min-width:140px; background:var(--slot-bg); border:2px dashed var(--slot-border);
  border-radius:var(--radius-md); padding:12px; min-height:90px; cursor:pointer; transition:border-color .15s, background .15s;
}
.zone:hover{border-color:var(--primary);}
.zone-title{font-weight:800; font-size:0.84rem; color:var(--secondary-dark); margin-bottom:8px;}
.zone .card-chip{font-size:0.88rem; padding:8px 12px;}
.zone-cards{display:flex; flex-wrap:wrap; gap:6px;}

.feedback-panel{
  margin-top:16px; padding:16px 18px; border-radius:var(--radius-md); font-size:0.94rem; line-height:1.55;
  animation:popIn .25s ease;
}
@keyframes popIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
.feedback-panel.correct{background:var(--correct-bg); border:1.5px solid var(--correct-border); color:#2C7A45;}
.feedback-panel.wrong{background:var(--wrong-bg); border:1.5px solid var(--wrong-border); color:#B5283C; animation:popIn .25s ease, shake .4s ease;}
.feedback-panel.partial{background:var(--partial-bg); border:1.5px solid var(--partial-border); color:#9A6300;}
.feedback-panel.hint{background:#EFEAFE; border:1.5px solid #D6C9FA; color:#5B4A99;}
.feedback-panel.incomplete{background:#F3F1FA; border:1.5px solid var(--card-border); color:var(--ink-soft);}
.feedback-title{font-weight:800; margin-bottom:4px; font-size:1rem;}
@keyframes shake{
  0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);} 80%{transform:translateX(4px);}
}

.quiz-toolbar{display:flex; flex-wrap:wrap; gap:10px; margin-top:22px;}
.quiz-toolbar .btn{flex:1; min-width:110px;}

/* ===== RESULT SCREEN ===== */
.result-hero{text-align:center; padding:30px 20px 10px;}
.result-hero .emoji{font-size:3rem;}
.result-hero h2{font-size:1.4rem; color:var(--primary-dark); margin-top:6px;}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:22px 0;}
.stat-box{background:var(--primary-bg); border-radius:var(--radius-md); padding:14px 12px; text-align:center;}
.stat-box .num{font-family:'Baloo 2',sans-serif; font-size:1.5rem; font-weight:800; color:var(--primary-dark);}
.stat-box .lbl{font-size:0.78rem; color:var(--ink-soft); margin-top:2px; font-weight:700;}
.badge-earned{
  display:flex; align-items:center; gap:10px; background:linear-gradient(135deg,#FFF3D6,#FFE2B0);
  border-radius:var(--radius-md); padding:14px 16px; margin:10px 0 20px; font-weight:800; color:#7A5400;
  animation:popIn .4s ease;
}
.result-actions{display:flex; flex-direction:column; gap:10px;}

/* ===== REVIEW SCREEN ===== */
.review-item{
  background:var(--card-bg); border:1.5px solid var(--card-border); border-radius:var(--radius-md);
  padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow-sm);
}
.review-item .rtag{font-size:0.74rem; color:var(--ink-faint); font-weight:700;}
.review-item .rtext{font-weight:700; margin-top:4px;}
.empty-state{text-align:center; padding:40px 20px; color:var(--ink-soft);}
.empty-state .emoji{font-size:2.6rem; display:block; margin-bottom:10px;}

/* ===== MODAL (rules) ===== */
.modal-overlay{
  position:fixed; inset:0; background:rgba(60,50,90,0.45); z-index:50;
  display:flex; align-items:center; justify-content:center; padding:20px; animation:popIn .2s ease;
}
.modal-box{
  background:var(--card-bg); border-radius:var(--radius-lg); padding:26px 24px; max-width:520px; width:100%;
  max-height:84vh; overflow-y:auto; box-shadow:var(--shadow-lg);
}
.modal-box h2{color:var(--primary-dark); font-size:1.25rem; margin-bottom:4px;}
.modal-box .modal-sub{color:var(--ink-soft); font-size:0.86rem; margin-bottom:16px;}
.rule-card{
  background:var(--primary-bg); border-radius:var(--radius-md); padding:13px 15px; margin-bottom:10px;
}
.rule-card .rnum{display:inline-block; background:var(--primary); color:#fff; font-weight:800; font-size:0.74rem; border-radius:var(--radius-pill); padding:2px 9px; margin-bottom:6px;}
.rule-card .rtext{font-weight:800; color:var(--ink); font-size:0.96rem;}
.rule-card .rex{color:var(--secondary-dark); font-size:0.88rem; margin-top:4px; font-style:italic;}
.modal-close{margin-top:10px; width:100%;}

/* ===== Responsive ===== */
@media (max-width:560px){
  .screen{padding:14px 12px 32px;}
  .panel{padding:20px 16px;}
  .prompt-text{font-size:1.05rem;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .quiz-toolbar .btn{min-width:90px; font-size:0.88rem; padding:11px 12px;}
  .match-cols{gap:8px;}
  .main-card{padding:32px 18px 26px;}
}

/* ====== ENGINE UI ====== */
.screen{max-width:600px;margin:0 auto;padding:18px 16px 40px;}
.main-card{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-lg);
  padding:40px 22px 30px;text-align:center;box-shadow:var(--shadow-md);margin-bottom:18px;}
.main-emoji{font-size:3.4rem;}
.main-title{font-family:'Baloo 2',sans-serif;font-size:2rem;color:var(--primary-dark);margin:6px 0 2px;}
.main-sub{color:var(--ink-soft);font-weight:700;font-size:0.95rem;}
.main-tag{display:inline-block;margin-top:14px;background:var(--primary-bg);color:var(--primary-dark);
  font-weight:800;font-size:0.82rem;border-radius:var(--radius-pill);padding:6px 14px;}
.menu-grid{display:flex;flex-direction:column;gap:12px;}
.menu-card{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;cursor:pointer;
  background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-md);
  padding:16px 18px;box-shadow:var(--shadow-sm);transition:transform .12s, box-shadow .12s;}
.menu-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.menu-card.primary{background:linear-gradient(135deg,var(--primary-bg),#EAF6FF);border-color:#C9EEF0;}
.mc-ic{font-size:1.5rem;}
.mc-t{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.12rem;color:var(--ink);}
.mc-d{font-size:0.82rem;color:var(--ink-soft);font-weight:700;}
.mini-stats{display:flex;gap:10px;margin-top:18px;}
.mini-stat{flex:1;background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-md);
  padding:12px;text-align:center;box-shadow:var(--shadow-sm);}
.ms-n{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.4rem;color:var(--primary-dark);}
.ms-l{font-size:0.74rem;color:var(--ink-soft);font-weight:700;}

.panel{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-lg);
  padding:24px 20px;box-shadow:var(--shadow-md);margin-bottom:16px;}
.panel-title{font-family:'Baloo 2',sans-serif;color:var(--primary-dark);font-size:1.35rem;margin-bottom:4px;}
.panel-sub{color:var(--ink-soft);font-size:0.9rem;font-weight:600;line-height:1.5;margin-bottom:14px;}
.back-btn{margin-bottom:12px;}
.btn{font-family:'Nunito',sans-serif;font-weight:800;border:none;border-radius:var(--radius-pill);
  padding:12px 18px;cursor:pointer;font-size:0.95rem;transition:transform .1s, box-shadow .1s, opacity .1s;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.5;cursor:default;}
.btn.primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm);}
.btn.primary:hover{background:var(--primary-dark);}
.btn.outline{background:#fff;color:var(--primary-dark);border:2px solid var(--primary);}
.btn.ghost{background:transparent;color:var(--ink-soft);}
.btn.big{width:100%;padding:15px;font-size:1.05rem;margin-top:6px;}

.part-list{background:var(--slot-bg);border-radius:var(--radius-md);padding:8px 12px;margin-bottom:14px;}
.part-row{display:flex;justify-content:space-between;padding:7px 2px;border-bottom:1px dashed var(--slot-border);font-weight:700;font-size:0.9rem;}
.part-row:last-child{border-bottom:none;}
.pr-count{color:var(--primary-dark);font-weight:800;}
.setting-row{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:0.9rem;
  background:var(--primary-bg);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:12px;}
.stepper{display:flex;align-items:center;gap:12px;}
.step-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;}
.step-val{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.1rem;min-width:18px;text-align:center;}
.total-line{text-align:center;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
.total-line b{color:var(--primary-dark);font-size:1.2rem;}

.unit-block{margin-bottom:18px;}
.unit-label{font-family:'Baloo 2',sans-serif;font-weight:800;color:var(--secondary-dark);margin:0 0 8px 4px;font-size:1.05rem;}
.chapter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chapter-card{text-align:left;cursor:pointer;background:var(--card-bg);border:1.5px solid var(--card-border);
  border-radius:var(--radius-md);padding:13px 14px;box-shadow:var(--shadow-sm);transition:transform .12s;}
.chapter-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.cc-top{display:flex;justify-content:space-between;align-items:center;}
.cc-page{font-size:0.72rem;color:var(--ink-faint);font-weight:800;}
.cc-title{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:0.98rem;color:var(--ink);margin:3px 0;line-height:1.2;}
.cc-meta{font-size:0.74rem;color:var(--ink-soft);font-weight:700;}
.ch-best{color:var(--accent);margin-left:4px;}
.count-grid{display:flex;gap:10px;margin:14px 0;}
.count-grid .btn{flex:1;}

/* QUIZ */
.quiz-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.qh-back{padding:8px 10px;font-size:0.85rem;}
.qh-center{flex:1;text-align:center;}
.qh-title{font-family:'Baloo 2',sans-serif;font-weight:800;color:var(--primary-dark);font-size:1rem;}
.qh-part{font-size:0.74rem;color:var(--ink-soft);font-weight:700;}
.qh-combo{min-width:60px;text-align:right;font-weight:800;color:var(--wrong);font-size:0.82rem;}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.progress-bar{flex:1;height:10px;background:var(--slot-bg);border-radius:var(--radius-pill);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:width .3s;}
.progress-txt{font-size:0.78rem;font-weight:800;color:var(--ink-soft);}
.stars-row{text-align:center;color:var(--accent);font-size:1.3rem;letter-spacing:3px;margin-bottom:10px;}
.quiz-panel{padding:20px 18px;}
.prompt-text{font-size:1.1rem;font-weight:800;color:var(--ink);line-height:1.5;text-align:center;margin-bottom:12px;}
.sentence-text{font-size:1.15rem;font-weight:700;color:var(--secondary-dark);text-align:center;
  background:var(--primary-bg);border-radius:var(--radius-md);padding:14px;margin-bottom:14px;line-height:1.5;}

.slot-area{min-height:54px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;
  background:var(--slot-bg);border:2px dashed var(--slot-border);border-radius:var(--radius-md);
  padding:12px;margin-bottom:14px;}
.slot-hint{color:var(--ink-faint);font-weight:700;font-size:0.86rem;width:100%;text-align:center;align-self:center;}
.card-pool,.choice-pool{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:8px;}
.choice-pool{gap:11px;}
.card{font-family:'Nunito',sans-serif;font-weight:700;background:var(--card-bg);border:1.5px solid var(--card-border);
  border-radius:var(--radius-sm);padding:10px 14px;font-size:0.95rem;color:var(--ink);cursor:pointer;
  box-shadow:var(--shadow-sm);transition:transform .12s, box-shadow .12s;}
.card:hover:not(:disabled){transform:translateY(-3px);box-shadow:var(--shadow-md);}
.card:disabled{cursor:default;}
.card.used{opacity:.32;pointer-events:none;}
.card.placed{background:var(--primary-bg);border-color:var(--primary);color:var(--primary-dark);}
.card.placed.small{font-size:0.84rem;padding:7px 11px;}
.card.choice{padding:13px 20px;font-size:1.02rem;}
.card.choice.selected{background:var(--primary);color:#fff;border-color:var(--primary-dark);}
.card.match-card.selected{background:var(--primary);color:#fff;}
.card.match-card.linked{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct);}
.link-ko{font-size:0.8rem;opacity:.9;}

.cat-area{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;}
.cat-box{flex:1 1 140px;background:var(--slot-bg);border:2px solid var(--slot-border);border-radius:var(--radius-md);padding:10px;min-height:70px;}
.cat-box.selectable{border-color:var(--primary);background:var(--primary-bg);cursor:pointer;}
.cat-name{font-weight:800;font-size:0.84rem;color:var(--secondary-dark);text-align:center;margin-bottom:6px;}
.cat-drop{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.match-cols{display:flex;gap:12px;}
.match-col{flex:1;display:flex;flex-direction:column;gap:8px;}

.quiz-toolbar{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap;}
.quiz-toolbar .btn{flex:1;min-width:100px;}

.feedback{margin-top:16px;border-radius:var(--radius-md);padding:16px;animation:popIn .3s ease;}
.feedback.correct{background:var(--correct-bg);border:1.5px solid var(--correct-border);}
.feedback.wrong{background:var(--wrong-bg);border:1.5px solid var(--wrong-border);}
.feedback.partial{background:var(--partial-bg);border:1.5px solid var(--partial-border);}
.fb-head{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:1.15rem;margin-bottom:6px;}
.feedback.correct .fb-head{color:var(--correct);}
.feedback.wrong .fb-head{color:var(--wrong);}
.feedback.partial .fb-head{color:var(--partial);}
.fb-line{font-weight:700;font-size:0.9rem;margin-bottom:4px;}
.fb-answer{font-weight:800;color:var(--ink);margin-bottom:6px;font-size:0.98rem;}
.fb-exp{font-size:0.9rem;color:var(--ink-soft);font-weight:600;line-height:1.5;}
.fb-combo{font-weight:800;color:var(--wrong);margin-top:8px;}
.fb-actions{display:flex;gap:8px;margin-top:14px;}
.fb-actions .btn{flex:1;}

.flash-correct{animation:flashGreen .6s ease;}
@keyframes flashGreen{0%,100%{box-shadow:var(--shadow-md);}40%{box-shadow:0 0 0 4px var(--correct-border), var(--shadow-md);}}
.shake{animation:shake .5s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes popIn{0%{transform:scale(.9);opacity:0;}100%{transform:scale(1);opacity:1;}}

.recommend{background:var(--partial-bg);border:1.5px solid var(--partial-border);border-radius:var(--radius-md);
  padding:12px 14px;font-weight:700;font-size:0.9rem;color:#8A5A12;margin-bottom:14px;}
.part-result{margin:6px 0 18px;}
.pr-title{font-weight:800;color:var(--secondary-dark);margin-bottom:10px;}
.part-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:0.8rem;}
.pbr-name{flex:0 0 130px;font-weight:700;color:var(--ink-soft);}
.pbr-track{flex:1;height:12px;background:var(--slot-bg);border-radius:var(--radius-pill);overflow:hidden;}
.pbr-fill{height:100%;border-radius:var(--radius-pill);transition:width .4s;}
.pbr-val{flex:0 0 42px;text-align:right;font-weight:800;color:var(--ink);}

.modal-box.small{max-width:400px;}
.hint-body{font-size:0.98rem;color:var(--ink);font-weight:600;line-height:1.6;margin-bottom:16px;}

.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);
  color:#fff;font-weight:700;font-size:0.88rem;padding:11px 20px;border-radius:var(--radius-pill);
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:80;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media (max-width:560px){
  .chapter-grid{grid-template-columns:1fr;}
  .match-cols{gap:8px;}
  .pbr-name{flex:0 0 100px;font-size:0.72rem;}
}

const externalQuestions = Array.isArray(window.QUESTION_BANK) ? window.QUESTION_BANK : [];

function validateQuestionBank(sourceQuestions){
  const seen = new Set();
  const allowedChapters = new Set(chapters.map(c => c.id));
  const allowedTypes = new Set(["order", "choice", "classify", "match", "guided_order", "question_answer_order", "sentence_type_analysis"]);
  const valid = [];
  sourceQuestions.forEach((q, index) => {
    const label = q && q.id ? q.id : `question_${index}`;
    const errors = [];
    if(!q || typeof q !== "object") errors.push("question is not an object");
    if(q && (!q.id || seen.has(q.id))) errors.push("missing or duplicate id");
    if(q && !allowedChapters.has(q.chapter)) errors.push("unknown chapter");
    if(q && !allowedTypes.has(q.type)) errors.push("unsupported type");
    if(q && q.type === "choice" && (!Array.isArray(q.cards) || !q.cards.includes(q.answer))) errors.push("choice answer is not in cards");
    if(q && q.type === "order" && (!Array.isArray(q.cards) || !Array.isArray(q.answer) || q.answer.some(card => !q.cards.includes(card)))) errors.push("order answer has a card not found in cards");
    if(q && q.type === "classify" && (!Array.isArray(q.categories) || !Array.isArray(q.cards) || q.cards.some(card => !q.categories.includes(card.category)))) errors.push("classify category mismatch");
    if(q && q.type === "match" && (!Array.isArray(q.pairs) || !q.pairs.length || q.pairs.some(pair => !pair.en || !pair.ko))) errors.push("match pairs are incomplete");
    if(q && (q.type === "guided_order" || q.type === "question_answer_order") && (!Array.isArray(q.fixedStart) || !Array.isArray(q.cards) || !Array.isArray(q.answer) || q.answer.some(card => !q.cards.includes(card)))) errors.push("guided answer has a card not found in cards");
    if(q && q.type === "sentence_type_analysis" && (!Array.isArray(q.cards) || !q.cards.includes(q.answer) || !q.analysis || q.analysis.type !== q.answer)) errors.push("sentence type analysis is incomplete");
    if(errors.length){
      console.warn(`[Question Bank] Skipped ${label}: ${errors.join(", ")}`, q);
      return;
    }
    seen.add(q.id);
    valid.push(q);
  });
  return valid;
}

  examConfig.forEach(p=>p.chapters.forEach(ch=>partByChapter[ch]=p.key));
  questions.forEach(q=>{
    const ch = chById[q.chapter] || {};
    q.page = ch.page || "";
    q.chapterTitle = ch.title || "";
    q.unit = ch.unit || "";
    q.examPart = partByChapter[q.chapter] || "";
  });
})();

/* ---------- HELPERS ---------- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
function sample(arr,n){ return shuffle(arr).slice(0, Math.min(n, arr.length)); }
function byChapter(chId){ return questions.filter(q=>q.chapter===chId); }
function qById(id){ return questions.find(q=>q.id===id); }
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- GAME STATE ---------- */
let G = null; // current session

function buildExamSession(){
  let qs = [];
  examConfig.forEach(p=>{
    let count = p.examCount;
    if(p.key==="p.154 Opinion Verbs") count = store.examSettings.opinionCount;
    let pool = [];
    p.chapters.forEach(ch=> pool=pool.concat(byChapter(ch)));
    qs = qs.concat(sample(pool, count));
  });
  return { mode:"exam", title:"시험 모드", questions: shuffle(qs), idx:0, results:[], hintsUsed:0 };
}
function buildPracticeSession(chId, count){
  let pool = byChapter(chId);
  let qs = (count==="all") ? shuffle(pool) : sample(pool, count);
  const ch = chapters.find(c=>c.id===chId);
  return { mode:"practice", chapterId:chId, title:`연습: ${ch.title}`, questions:qs, idx:0, results:[], hintsUsed:0 };
}
function buildReviewSession(){
  const ids = store.wrongList.slice();
  const qs = shuffle(ids.map(qById).filter(Boolean));
  return { mode:"review", title:"틀린 문제 복습", questions:qs, idx:0, results:[], hintsUsed:0, reviewIds:ids };
}
function buildSentenceTypeSession(){
  const pool = byChapter("ch9").filter(q=>q.type==="sentence_type_analysis");
  return { mode:"sentenceTypes", chapterId:"ch9", title:"Sentence Types 집중 연습", questions:sample(pool,20), idx:0, results:[], hintsUsed:0 };
}

/* prompt block */
function promptBlock(q){
  let h = "";
  const promptMain = q.promptEn || q.instruction || (!q.promptEn && !q.sentenceEn ? q.promptKo : "");
  if(promptMain) h += `<div class="prompt-text">${esc(promptMain)}</div>`;
  if(q.promptKo && q.promptKo !== promptMain) h += `<div class="prompt-ko">${esc(q.promptKo)}</div>`;
  if(q.questionEn) h += `<div class="sentence-text">${esc(q.questionEn)}</div>`;
  if(q.questionKo) h += `<div class="prompt-ko">${esc(q.questionKo)}</div>`;
  if(Array.isArray(q.sourceSentences) && q.sourceSentences.length){
    h += `<div class="source-list">${q.sourceSentences.map(x=>`<div class="source-line">${esc(x)}</div>`).join("")}</div>`;
  }
  const sentenceMain = q.sentenceEn || q.sentence || "";
  if(sentenceMain) h += `<div class="sentence-text">${esc(sentenceMain)}</div>`;
  if(q.sentenceKo) h += `<div class="prompt-ko">${esc(q.sentenceKo)}</div>`;
  return h;
}

}

/* ===== ORDER ===== */
function renderOrder(panel,wrap,q){
  const cards = shuffle(q.cards);
  let placed = []; // selected card texts in order
  panel.innerHTML = promptBlock(q) +
    `<div class="slot-area" id="slots"></div>
     <div class="card-pool" id="pool"></div>` + toolbar();
  const slots = panel.querySelector('#slots');
  const pool = panel.querySelector('#pool');
  function draw(){
    slots.innerHTML = placed.length? "" : `<div class="slot-hint">카드를 눌러 여기에 순서대로 배치하세요</div>`;
    placed.forEach((t,i)=>{
      const c=el(`<button class="card placed">${esc(t)}</button>`);
      c.onclick=()=>{ placed.splice(i,1); draw(); };
      slots.appendChild(c);
    });
    pool.innerHTML="";
    const counts={}; placed.forEach(t=>counts[t]=(counts[t]||0)+1);
    const used={};
    cards.forEach(t=>{
      used[t]=(used[t]||0);
      const isUsed = used[t] < (counts[t]||0);
      used[t]++;
      const c=el(`<button class="card ${isUsed?'used':''}">${esc(t)}</button>`);
      if(!isUsed) c.onclick=()=>{ placed.push(t); draw(); };
      pool.appendChild(c);
    });
  }
  draw();
  wireTools(panel,wrap,q,{
    reset:()=>{ placed=[]; draw(); },
    check:()=>{
      const correct = placed.length===q.answer.length && placed.every((t,i)=>t===q.answer[i]);
      let partial=false;
      if(!correct){ let m=0; for(let i=0;i<Math.min(placed.length,q.answer.length);i++){ if(placed[i]===q.answer[i]) m++; else break; } partial = m>0; }
      feedback(panel,wrap,q,correct,partial,()=>q.answer.join(" "));
    }
  });
}

/* ===== CLASSIFY ===== */
function renderClassify(panel,wrap,q){
  let assign={}; // cardText -> category
  panel.innerHTML = promptBlock(q) +
    `<div class="card-pool" id="pool"></div>
     <div class="cat-area" id="cats"></div>` + toolbar();
  const pool=panel.querySelector('#pool'), cats=panel.querySelector('#cats');
  function draw(){
    pool.innerHTML="";
    q.cards.forEach(card=>{
      if(assign[card.text]) return;
      const c=el(`<button class="card">${esc(card.text)}</button>`);
      c.onclick=()=>{ pick(card.text); };
      pool.appendChild(c);
    });
    if(!pool.children.length) pool.innerHTML=`<div class="slot-hint">모든 카드를 분류했어요!</div>`;
    cats.innerHTML="";
    q.categories.forEach(cat=>{
      const box=el(`<div class="cat-box"><div class="cat-name">${esc(cat)}</div><div class="cat-drop"></div></div>`);
      const drop=box.querySelector('.cat-drop');
      Object.keys(assign).forEach(t=>{ if(assign[t]===cat){
        const c=el(`<button class="card placed small">${esc(t)}</button>`);
        c.onclick=()=>{ delete assign[t]; draw(); };
        drop.appendChild(c);
      }});
      cats.appendChild(box);
    });
  }
  let pendingCard=null;
  function pick(text){
    pendingCard=text;
    // simple: highlight categories to choose
    cats.querySelectorAll('.cat-box').forEach(b=>{
      b.classList.add('selectable');
      b.onclick=()=>{ assign[text]=b.querySelector('.cat-name').textContent; cats.querySelectorAll('.cat-box').forEach(x=>{x.classList.remove('selectable');x.onclick=null;}); draw(); };
    });
    toast("넣을 칸을 눌러주세요");
  }
  draw();
  wireTools(panel,wrap,q,{
    reset:()=>{ assign={}; draw(); },
    check:()=>{
      if(Object.keys(assign).length < q.cards.length){ toast("모든 카드를 분류해주세요!"); return; }
      const correct = q.cards.every(c=> assign[c.text]===c.category);
      feedback(panel,wrap,q,correct,false, ()=> q.cards.map(c=>`${c.text} → ${c.category}`).join("  /  "));
    }
  });
}

/* ===== MATCH ===== */
function renderMatch(panel,wrap,q){
  let selectedEn=null, links={}; // en -> ko
  const kos = shuffle(q.pairs.map(p=>p.ko));
  panel.innerHTML = promptBlock(q) +
    `<div class="match-cols"><div class="match-col" id="enCol"></div><div class="match-col" id="koCol"></div></div>` + toolbar();
  const enCol=panel.querySelector('#enCol'), koCol=panel.querySelector('#koCol');
  function draw(){
    enCol.innerHTML=""; koCol.innerHTML="";
    q.pairs.forEach(p=>{
      const linked = links[p.en];
      const c=el(`<button class="card match-card ${selectedEn===p.en?'selected':''} ${linked?'linked':''}">${esc(p.en)}${linked?`<span class="link-ko"> → ${esc(linked)}</span>`:""}</button>`);
      c.onclick=()=>{ if(linked){ delete links[p.en]; selectedEn=null; } else { selectedEn=p.en; } draw(); };
      enCol.appendChild(c);
    });
    kos.forEach(ko=>{
      const usedBy = Object.keys(links).find(en=>links[en]===ko);
      const c=el(`<button class="card match-card ${usedBy?'used':''}">${esc(ko)}</button>`);
      if(!usedBy) c.onclick=()=>{ if(selectedEn){ links[selectedEn]=ko; selectedEn=null; draw(); } else toast("왼쪽 영어 카드를 먼저 선택하세요"); };
      koCol.appendChild(c);
    });
  }
  draw();
  wireTools(panel,wrap,q,{
    reset:()=>{ links={}; selectedEn=null; draw(); },
    check:()=>{
      if(Object.keys(links).length<q.pairs.length){ toast("모두 연결해주세요!"); return; }
      const correct=q.pairs.every(p=>links[p.en]===p.ko);
      feedback(panel,wrap,q,correct,false, ()=> q.pairs.map(p=>`${p.en} → ${p.ko}`).join("  /  "));
    }
  });
}


/* ===== GUIDED ORDER ===== */
function renderGuidedOrder(panel,wrap,q){
  renderFixedBlankOrder(panel,wrap,q,false);
}

/* ===== QUESTION ANSWER ORDER ===== */
function renderQuestionAnswerOrder(panel,wrap,q){
  renderFixedBlankOrder(panel,wrap,q,true);
}

function renderFixedBlankOrder(panel,wrap,q,isQuestionAnswer){
  const cards = shuffle(q.cards);
  let placed = [];
  panel.innerHTML = promptBlock(q) +
    `<div class="guided-sentence" id="guidedLine"></div>
     <div class="card-pool" id="pool"></div>` + toolbar();
  const line = panel.querySelector('#guidedLine');
  const pool = panel.querySelector('#pool');
  function draw(){
    line.innerHTML = "";
    (q.fixedStart || []).forEach(t=>line.appendChild(el(`<span class="fixed-word">${esc(t)}</span>`)));
    for(let i=0;i<(q.blankCount || q.answer.length);i++){
      const value = placed[i];
      const slot = el(value ? `<button class="card placed">${esc(value)}</button>` : `<span class="blank-slot">&nbsp;</span>`);
      if(value) slot.onclick=()=>{ placed.splice(i,1); draw(); };
      line.appendChild(slot);
    }
    pool.innerHTML = "";
    const counts={}; placed.forEach(t=>counts[t]=(counts[t]||0)+1);
    const used={};
    cards.forEach(t=>{
      used[t]=(used[t]||0);
      const isUsed = used[t] < (counts[t]||0);
      used[t]++;
      const c=el(`<button class="card ${isUsed?'used':''}">${esc(t)}</button>`);
      if(!isUsed) c.onclick=()=>{ if(placed.length < (q.blankCount || q.answer.length)){ placed.push(t); draw(); } };
      pool.appendChild(c);
    });
  }
  draw();
  wireTools(panel,wrap,q,{
    reset:()=>{ placed=[]; draw(); },
    check:()=>{
      if(placed.length < q.answer.length){ toast("빈칸을 모두 채워주세요!"); return; }
      const correct = placed.length===q.answer.length && placed.every((t,i)=>t===q.answer[i]);
      let partial=false;
      if(!correct){ let m=0; for(let i=0;i<Math.min(placed.length,q.answer.length);i++){ if(placed[i]===q.answer[i]) m++; else break; } partial=m>0; }
      feedback(panel,wrap,q,correct,partial,()=>q.fullAnswer || [...(q.fixedStart||[]), ...q.answer].join(" "), placed.join(" "));
    }
  });
}
/* ---------- TOOLS (hint/reset/check) ---------- */
function wireTools(panel,wrap,q,handlers){
  panel.querySelector('#tReset').onclick = handlers.reset;
  panel.querySelector('#tCheck').onclick = handlers.check;
  panel.querySelector('#tHint').onclick = ()=>{
    if(!q._hintUsed){ q._hintUsed=true; q._stars=Math.max(1,q._stars-1); G.hintsUsed++; renderStars(wrap,q); }
    showHint(q);
  };
}
function showHint(q){
  let h = q.explanation || "정답의 구조를 다시 생각해보세요.";
  if(q.type==="sentence_type_analysis"){
    h = "Simple: complete sentence 1\nCompound: complete sentence 2 + and / but / so\nComplex: if / when / after / before / because / who / that / which clause";
  }
  // shorten as a hint
  const ov = el(`<div class="modal-overlay"></div>`);
  ov.innerHTML=`<div class="modal-box small"><h2>💡 힌트</h2><p class="hint-body">${esc(h)}</p><button class="btn primary modal-close" id="ok">알겠어요</button></div>`;
  document.body.appendChild(ov);
  ov.querySelector('#ok').onclick=()=>ov.remove();
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
}

/* ---------- FEEDBACK ---------- */
function feedback(panel,wrap,q,correct,partial,answerStr,chosen){
  // record result
  G.results.push({ id:q.id, correct, examPart:q.examPart, chapter:q.chapter, stars:correct?q._stars:0, sentenceType:q.analysis && q.analysis.type });
  if(correct){
    combo++;
    removeFromWrong(q.id);
  } else {
    combo=0;
    addToWrong(q.id);
  }
  const cls = correct?"correct": (partial?"partial":"wrong");
  panel.classList.add(correct?"flash-correct": "shake");
  setTimeout(()=>panel.classList.remove("flash-correct","shake"),600);
  const head = correct? "정답입니다! 🎉" : (partial? "거의 다 왔어요! 🤏" : "아직 어색해요 🤔");
  const fb = el(`<div class="feedback ${cls}">
     <div class="fb-head">${head}</div>
     ${chosen!=null && !correct? `<div class="fb-line">틀린 선택: <b>${esc(chosen)}</b></div>`:""}
     <div class="fb-answer">정답: ${esc(answerStr())}</div>
     <div class="fb-exp">${esc(q.explanation||"")}</div>
     ${q.type==="sentence_type_analysis"?sentenceAnalysisHtml(q):""}
     ${combo>1 && correct? `<div class="fb-combo">🔥 ${combo} 콤보!</div>`:""}
     <div class="fb-actions">
       ${!correct? `<button class="btn outline" id="retry">다시 도전</button>`:""}
       <button class="btn primary" id="next">${G.idx+1>=G.questions.length?"결과 보기":"다음 문제 →"}</button>
     </div>
  </div>`);
  panel.appendChild(fb);
  fb.scrollIntoView({behavior:"smooth",block:"nearest"});
  // lock the tools
  panel.querySelectorAll('.quiz-toolbar .btn').forEach(b=>b.disabled=true);
  panel.querySelectorAll('.card').forEach(b=>b.disabled=true);
  if(!correct){
    fb.querySelector('#retry').onclick=()=>{ G.results.pop(); go(screenQuiz); };
  }
  fb.querySelector('#next').onclick=()=>{ G.idx++; go(screenQuiz); };
}
function addToWrong(id){ if(!store.wrongList.includes(id)){ store.wrongList.push(id); saveStore(store);} }
function removeFromWrong(id){ const i=store.wrongList.indexOf(id); if(i>=0){ store.wrongList.splice(i,1); saveStore(store);} }

/* =========================================================
   RESULT SCREEN
   ========================================================= */
function screenResult(){
  const res=G.results;
  const tot=res.length;
  const correctN=res.filter(r=>r.correct).length;
  const acc = tot? Math.round(correctN/tot*100):0;

  // per-part stats (exam) or per-chapter
  const groupKey = G.mode==="exam" ? "examPart" : "chapter";
  const groups={};
  res.forEach(r=>{ const k=r[groupKey]||"기타"; groups[k]=groups[k]||{t:0,c:0}; groups[k].t++; if(r.correct)groups[k].c++; });
  let worst=null;
  Object.keys(groups).forEach(k=>{ const g=groups[k]; const a=g.c/g.t; if(worst===null||a<worst.a) worst={k,a,g}; });

  // badge for practice perfect
  let newBadge=null;
  if(G.mode==="practice" && acc>=80){
    const ch=chapters.find(c=>c.id===G.chapterId);
    if(ch && !store.badges.includes(ch.badge)){ store.badges.push(ch.badge); newBadge=ch.badge; saveStore(store); }
    const prev=store.chapterBest[G.chapterId];
    const stars=Math.round(res.reduce((s,r)=>s+r.stars,0)/tot);
    if(!prev || acc>prev.acc){ store.chapterBest[G.chapterId]={stars,acc}; saveStore(store); }
    store.lastChapter=G.chapterId; saveStore(store);
  }

  const emoji = acc>=90?"🏆": acc>=70?"😄": acc>=50?"🙂":"💪";
  const wrap=el(`<div class="screen"></div>`);
  let partHtml="";
  if(G.mode==="sentenceTypes"){
    const order=["Simple","Compound","Complex"];
    const typeGroups={};
    res.forEach(r=>{ const k=r.sentenceType||"Other"; typeGroups[k]=typeGroups[k]||{t:0,c:0}; typeGroups[k].t++; if(r.correct) typeGroups[k].c++; });
    let weakest=null;
    order.forEach(k=>{ const g=typeGroups[k]||{t:0,c:0}; const rate=g.t?g.c/g.t:1; if(!weakest || rate<weakest.rate) weakest={k,rate,g}; });
    const tip = weakest && weakest.k==="Complex" ? "복습 추천: if / because / who / that / which가 보이면 Complex로 판단하세요." :
      weakest && weakest.k==="Compound" ? "복습 추천: 완전한 문장 2개가 and / but / so로 연결되면 Compound입니다." :
      "복습 추천: 연결어 없이 완전한 문장 1개만 있으면 Simple입니다.";
    partHtml = `<div class="part-result"><div class="pr-title">Sentence Types 결과</div>${order.map(k=>{ const g=typeGroups[k]||{t:0,c:0}; const a=g.t?Math.round(g.c/g.t*100):0; return `<div class="part-bar-row"><span class="pbr-name">${k}</span><div class="pbr-track"><div class="pbr-fill" style="width:${a}%;background:${a>=70?'var(--correct)':a>=40?'var(--partial)':'var(--wrong)'}"></div></div><span class="pbr-val">${g.c}/${g.t}</span></div>`; }).join("")}<div class="sentence-result-note"><b>가장 약한 유형:</b> ${weakest?weakest.k:"없음"}<br>${tip}</div></div>`;
  }
  if(G.mode==="exam"){
    partHtml = `<div class="part-result"><div class="pr-title">파트별 정답률</div>`+
      examConfig.map(p=>{
        const g=groups[p.key]; if(!g) return "";
        const a=Math.round(g.c/g.t*100);
        return `<div class="part-bar-row"><span class="pbr-name">${esc(p.key)}</span>
          <div class="pbr-track"><div class="pbr-fill" style="width:${a}%;background:${a>=70?'var(--correct)':a>=40?'var(--partial)':'var(--wrong)'}"></div></div>
          <span class="pbr-val">${g.c}/${g.t}</span></div>`;
      }).join("")+`</div>`;
  }
  wrap.innerHTML=`
    <div class="panel">
      <div class="result-hero"><div class="emoji">${emoji}</div><h2>${esc(G.title)} 완료!</h2></div>
      <div class="stat-grid">
        <div class="stat-box"><div class="num">${correctN}/${tot}</div><div class="lbl">맞힌 문제</div></div>
        <div class="stat-box"><div class="num">${acc}%</div><div class="lbl">정답률</div></div>
        <div class="stat-box"><div class="num">${G.hintsUsed}</div><div class="lbl">사용한 힌트</div></div>
        <div class="stat-box"><div class="num">${tot-correctN}</div><div class="lbl">틀린 문제</div></div>
      </div>
      ${newBadge?`<div class="badge-earned">🏅 새 배지 획득: <b>${esc(newBadge)}</b></div>`:""}
      ${worst && worst.a<1?`<div class="recommend">📌 복습 추천: <b>${esc(worst.k)}</b> (가장 많이 틀린 파트)</div>`:""}
      ${partHtml}
      <div class="result-actions">
        ${tot-correctN>0?`<button class="btn outline" id="retryWrong">틀린 문제 다시 풀기 (${tot-correctN})</button>`:""}
        <button class="btn primary" id="home">메인으로</button>
      </div>
    </div>`;
  app.appendChild(wrap);
  if(tot-correctN>0){
    wrap.querySelector('#retryWrong').onclick=()=>{
      const wrongIds=res.filter(r=>!r.correct).map(r=>r.id);
      G={ mode:"review", title:"틀린 문제 다시 풀기", questions:shuffle(wrongIds.map(qById).filter(Boolean)), idx:0, results:[], hintsUsed:0 };
      combo=0; go(screenQuiz);
    };
  }
  wrap.querySelector('#home').onclick=()=>{ combo=0; go(screenMain); };
}

/* ---------- RULES MODAL ---------- */
function showRulesModal(){
  const ov=el(`<div class="modal-overlay"></div>`);
  ov.innerHTML=`<div class="modal-box"><h2>⭐ 시험 직전 핵심 규칙</h2>
    <p class="modal-sub">시험 보기 전에 꼭 기억하세요!</p>
    ${sentenceTypeRulesHtml()}
    ${examRules.map((r,i)=>`<div class="rule-card"><span class="rnum">규칙 ${i+1}</span>
      <div class="rtext">${esc(r.rule)}</div><div class="rex">예: ${esc(r.example)}</div></div>`).join("")}
    <button class="btn primary modal-close" id="ok">닫기</button></div>`;
  document.body.appendChild(ov);
  ov.querySelector('#ok').onclick=()=>ov.remove();
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
}

/* ---------- TOAST ---------- */
let toastT=null;
function toast(msg){
  let t=document.querySelector('.toast');
  if(!t){ t=el(`<div class="toast"></div>`); document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---------- BOOT ---------- */
go(screenMain);

</script>
